services:
  go-api:
    build:
      context: ./apps/go-api
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - NODE_API_URL=http://node-api:3002
      - JWT_SECRET=${JWT_SECRET:-supersecret123}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-secret}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    networks:
      - challenge-network
    restart: unless-stopped

  node-api:
    build:
      context: ./apps/node-api
      dockerfile: Dockerfile
    ports:
      - '3002:3002'
    environment:
      - PORT=3002
      - JWT_SECRET=${JWT_SECRET:-supersecret123}
      - NODE_ENV=production
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-secret}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    networks:
      - challenge-network
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      - go-api
      - node-api
    networks:
      - challenge-network
    restart: unless-stopped

networks:
  challenge-network:
    driver: bridge
