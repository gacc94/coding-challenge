services:
  go-api:
    build:
      context: ./apps/go-api
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - NODE_API_URL=http://node-api:3002
      - JWT_SECRET=${JWT_SECRET:-supersecret123}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-secret}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    networks:
      - challenge-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  node-api:
    build:
      context: ./apps/node-api
      dockerfile: Dockerfile
    ports:
      - '3002:3002'
    environment:
      - PORT=3002
      - JWT_SECRET=${JWT_SECRET:-supersecret123}
      - NODE_ENV=production
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-secret}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    networks:
      - challenge-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3002/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      go-api:
        condition: service_healthy
    networks:
      - challenge-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:80/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  challenge-network:
    driver: bridge
